{% extends "base.html" %}

{% block content %}

<style>

.delete-container{
    display:flex;
    justify-content:center;
}

.delete-card{
    background:white;
    width:100%;
    max-width:500px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    text-align:center;
}

.delete-title{
    font-size:24px;
    font-weight:600;
    margin-bottom:15px;
    color:#111827;
}

.delete-message{
    font-size:16px;
    color:#374151;
    margin-bottom:25px;
}

.car-name{
    font-weight:600;
}

/* BUTTONS */

.buttons-container{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

.btn{
    padding:10px 18px;
    border-radius:8px;
    font-size:14px;
    text-decoration:none;
    font-weight:500;
    border:none;
    cursor:pointer;
    transition:0.2s;
}

.btn-danger{
    background:#ef4444;
    color:white;
}

.btn-danger:hover{
    background:#dc2626;
}

.btn-secondary{
    background:#6b7280;
    color:white;
}

.btn-secondary:hover{
    background:#4b5563;
}

</style>

<div class="delete-container">

<div class="delete-card">

<div class="delete-title">
Deletar Carro
</div>

<div class="delete-message">
Tem certeza que deseja deletar o carro 
<strong class="car-name">
{{ object.brand }} {{ object.model }}
</strong>?
</div>

<form method="post">

{% csrf_token %}

<div class="buttons-container">

<button type="submit" class="btn btn-danger">
Deletar Carro
</button>

<a href="{% url 'car_update' pk=object.pk %}" class="btn btn-secondary">
Cancelar
</a>

</div>

</form>

</div>

</div>

{% endblock %}
