{% extends 'base.html' %}

{% block content %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

.login-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
    background:linear-gradient(135deg,#f5f7fa,#e4e8ef);
    font-family:'Inter', sans-serif;
}

.login-card{
    background:white;
    padding:40px;
    border-radius:12px;
    width:360px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.login-title{
    text-align:center;
    font-size:24px;
    font-weight:600;
    margin-bottom:25px;
    color:#1f2937;
}

.form-group{
    display:flex;
    flex-direction:column;
    margin-bottom:18px;
}

.form-group label{
    font-size:14px;
    font-weight:500;
    margin-bottom:6px;
    color:#374151;
}

.form-group input{
    padding:10px;
    border-radius:6px;
    border:1px solid #d1d5db;
    font-size:14px;
    transition:0.2s;
}

.form-group input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}

.register-text{
    font-size:13px;
    text-align:center;
    margin-bottom:20px;
    color:#6b7280;
}

.register-text a{
    color:#2563eb;
    text-decoration:none;
    font-weight:500;
}

.register-text a:hover{
    text-decoration:underline;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:0.2s;
}

.login-btn:hover{
    background:#1d4ed8;
    transform:translateY(-1px);
}
</style>

<div class="login-container">

    <div class="login-card">

        <div class="login-title">
            Acessar Conta
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">Usuário</label>
                {{ login_form.username }}
            </div>

            <div class="form-group">
                <label for="id_password">Senha</label>
                {{ login_form.password }}
            </div>

            <div class="register-text">
                Ainda não tem uma conta? 
                <a href="{% url 'register' %}">Registre-se</a>
            </div>

            <button class="login-btn" type="submit">
                Entrar
            </button>

        </form>

    </div>

</div>

{% endblock %}
